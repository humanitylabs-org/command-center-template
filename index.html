<!doctype html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Command Center Template</title>
 <style>
 :root {
 --bg: #0b1020;
 --card: #121a30;
 --muted: #8fa1c7;
 --text: #e8efff;
 --accent: #58a6ff;
 --ok: #22c55e;
 --warn: #f59e0b;
 --bad: #ef4444;
 --border: #233055;
 }
 * { box-sizing: border-box; }
 body {
 margin: 0;
 font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
 background: linear-gradient(160deg, #0a0f1f 0%, #0d1530 100%);
 color: var(--text);
 }
 .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
 .topbar {
 display: flex; justify-content: space-between; align-items: center;
 margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
 }
 .title { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.2px; }
 .sub { color: var(--muted); font-size: 0.92rem; }
 .pill {
 border: 1px solid var(--border);
 background: #0f1730;
 color: var(--muted);
 border-radius: 999px;
 padding: 6px 10px;
 font-size: 0.8rem;
 }
 .grid {
 display: grid;
 gap: 14px;
 grid-template-columns: repeat(12, minmax(0, 1fr));
 }
 .card {
 background: rgba(18, 26, 48, 0.9);
 border: 1px solid var(--border);
 border-radius: 14px;
 padding: 14px;
 backdrop-filter: blur(8px);
 }
 .card h3 { margin: 0 0 10px; font-size: 0.98rem; }
 .kpi {
 display: grid;
 grid-template-columns: repeat(4, minmax(0, 1fr));
 gap: 10px;
 }
 .kpi .box {
 background: #0d1430;
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 10px;
 }
 .label { color: var(--muted); font-size: 0.78rem; }
 .value { font-size: 1.18rem; font-weight: 700; margin-top: 4px; }
 .col-12 { grid-column: span 12; }
 .col-8 { grid-column: span 8; }
 .col-6 { grid-column: span 6; }
 .col-4 { grid-column: span 4; }
 .col-3 { grid-column: span 3; }
 ul { margin: 0; padding-left: 18px; }
 li { margin: 6px 0; }
 .status { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.74rem; font-weight: 600; }
 .status.ok { background: rgba(34,197,94,.15); color: #86efac; }
 .status.warn { background: rgba(245,158,11,.15); color: #fcd34d; }
 .status.bad { background: rgba(239,68,68,.15); color: #fca5a5; }
 table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
 th, td { padding: 8px; border-bottom: 1px solid #1c274a; text-align: left; }
 th { color: var(--muted); font-weight: 600; }
 @media (max-width: 920px) {
 .col-8, .col-6, .col-4, .col-3 { grid-column: span 12; }
 .kpi { grid-template-columns: repeat(2, minmax(0, 1fr)); }
 }
 </style>
</head>
<body>
 <div class="wrap">
 <div class="topbar">
 <div>
 <div class="title">Command Center Template</div>
 <div class="sub">Plug in your own metrics, priorities, and campaign cadence.</div>
 </div>
 <div class="pill">Last Updated: <span id="updatedAt"></span></div>
 </div>

 <div class="grid">
 <section class="card col-12">
 <h3>Scoreboard</h3>
 <div class="kpi" id="kpis"></div>
 </section>

 <section class="card col-8">
 <h3>Top Priorities</h3>
 <ul id="priorities"></ul>
 </section>

 <section class="card col-4">
 <h3>Today Focus Blocks</h3>
 <ul id="focusBlocks"></ul>
 </section>

 <section class="card col-6">
 <h3>Campaign Pipeline</h3>
 <table>
 <thead>
 <tr><th>Campaign</th><th>Status</th><th>Next Action</th></tr>
 </thead>
 <tbody id="campaigns"></tbody>
 </table>
 </section>

 <section class="card col-6">
 <h3>Upcoming Calls / Events</h3>
 <table>
 <thead>
 <tr><th>Date</th><th>Item</th><th>Owner</th></tr>
 </thead>
 <tbody id="events"></tbody>
 </table>
 </section>

 <section class="card col-12">
 <h3>Daily Execution Rules</h3>
 <ul id="rules"></ul>
 </section>
 </div>
 </div>

 <script>
 const data = {
 updatedAt: new Date().toLocaleString(),
 kpis: [
 { label: "Leads", value: "215" },
 { label: "Calls Booked", value: "18" },
 { label: "Applications", value: "7" },
 { label: "Revenue Pipeline", value: "$187.5K" }
 ],
 priorities: [
 "Fill upcoming cohort using calls + outreach",
 "Run consistent 1:1 follow-up blocks daily",
 "Advance active investor opportunities",
 "Support flagship event conversion"
 ],
 focusBlocks: [
 "Campaign push: 45-60 min",
 "Personal outreach sprint: 60 min",
 "Follow-up + social: 45 min"
 ],
 campaigns: [
 { name: "Promo Call Wave", status: "Active", tone: "ok", next: "Send reminder batch" },
 { name: "Last-Chance Webinar", status: "Planned", tone: "warn", next: "Finalize landing + copy" },
 { name: "Investor Follow-up", status: "Active", tone: "ok", next: "15 personal messages" }
 ],
 events: [
 { date: "YYYY-MM-DD", item: "Campaign Update Call", owner: "Host" },
 { date: "YYYY-MM-DD", item: "Main Event", owner: "Team" },
 { date: "YYYY-MM-DD", item: "Last-Chance Webinar", owner: "Host" }
 ],
 rules: [
 "Priority order: primary revenue objective first",
 "No new projects before daily follow-up block is complete",
 "Every call ends with one clear CTA",
 "Update dashboard at end of day"
 ]
 };

 document.getElementById("updatedAt").textContent = data.updatedAt;

 const kpiWrap = document.getElementById("kpis");
 data.kpis.forEach(k => {
 const box = document.createElement("div");
 box.className = "box";
 box.innerHTML = `<div class="label">${k.label}</div><div class="value">${k.value}</div>`;
 kpiWrap.appendChild(box);
 });

 const fillList = (id, arr) => {
 const el = document.getElementById(id);
 arr.forEach(item => {
 const li = document.createElement("li");
 li.textContent = item;
 el.appendChild(li);
 });
 };

 fillList("priorities", data.priorities);
 fillList("focusBlocks", data.focusBlocks);
 fillList("rules", data.rules);

 const campaignsEl = document.getElementById("campaigns");
 data.campaigns.forEach(c => {
 const tr = document.createElement("tr");
 tr.innerHTML = `<td>${c.name}</td><td><span class="status ${c.tone}">${c.status}</span></td><td>${c.next}</td>`;
 campaignsEl.appendChild(tr);
 });

 const eventsEl = document.getElementById("events");
 data.events.forEach(e => {
 const tr = document.createElement("tr");
 tr.innerHTML = `<td>${e.date}</td><td>${e.item}</td><td>${e.owner}</td>`;
 eventsEl.appendChild(tr);
 });
 </script>
</body>
</html>
